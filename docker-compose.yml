services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bbox
      POSTGRES_USER: bbox
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  validator:
    build: ./validator
    ports:
      - "3000:3000"

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: bbox
      DB_USERNAME: bbox
      DB_PASSWORD: secret
      VALIDATOR_URL: http://validator:3000
    depends_on:
      db:
        condition: service_healthy
      validator:
        condition: service_started

volumes:
  pgdata:
